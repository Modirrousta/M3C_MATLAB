<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorial Series | Index</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --accent-color: #0055aa;
            --border-color: #e0e0e0;
            --hover-bg: #f9f9f9;
        }

        body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            border-bottom: 4px solid var(--text-color);
            margin-bottom: 30px;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        h1 {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin: 0;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            align-items: center;
        }

        /* Search Bar Styling */
        #tutorialSearch {
            flex-grow: 1;
            padding: 10px;
            border: 2px solid var(--text-color);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
        }

        /* PDF Button Styling */
        .pdf-button {
            background-color: var(--text-color);
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: opacity 0.2s;
        }

        .pdf-button:hover {
            opacity: 0.8;
        }

        nav ul {
            list-style: none;
            padding: 0;
        }

        .tutorial-item {
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .tutorial-item:hover {
            border-color: var(--text-color);
            background-color: var(--hover-bg);
        }

        .tutorial-item a {
            display: block;
            padding: 15px 20px;
            text-decoration: none;
            color: var(--text-color);
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tutorial-item a::after {
            content: '→';
            color: var(--accent-color);
        }

        footer {
            margin-top: 60px;
            font-size: 0.8rem;
            color: #999;
            text-align: center;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        /* Print Media Query for PDF */
        @media print {
            .controls, footer, .tutorial-item a::after {
                display: none;
            }
            body { padding: 0; }
            .tutorial-item { border: none; border-bottom: 1px solid #ccc; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Tutorial Series</h1>
    </header>

    <div class="controls">
        <input type="text" id="tutorialSearch" placeholder="Search tutorials..." onkeyup="filterTutorials()">
        <button class="pdf-button" onclick="window.print()">Save Page as PDF</button>
    </div>

    <nav>
        <ul id="tutorialList">
            <li class="tutorial-item"><a href="Part_One.html">Part One: Introduction and Fundamentals</a></li>
            <li class="tutorial-item"><a href="Part_Two.html">Part Two: Advanced Applications</a></li>
            <li class="tutorial-item"><a href="Part_Three.html">Part Three: Conclusion and Summary</a></li>
        </ul>
    </nav>

    <footer>
        <p>&copy; 2026 | Educational Resources Archive</p>
    </footer>

    <script>
        function filterTutorials() {
            const input = document.getElementById('tutorialSearch');
            const filter = input.value.toLowerCase();
            const ul = document.getElementById("tutorialList");
            const li = ul.getElementsByTagName('li');

            for (let i = 0; i < li.length; i++) {
                const text = li[i].textContent || li[i].innerText;
                if (text.toLowerCase().indexOf(filter) > -1) {
                    li[i].style.display = "";
                } else {
                    li[i].style.display = "none";
                }
            }
        }
    </script>

</body>
</html>
